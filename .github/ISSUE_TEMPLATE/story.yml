name: 📖 Story
description: A user story for planned development work
title: 'story: '
labels: ['story']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Define a user story following the standard format.

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: 'Use the format: As a [role], I want [feature] so that [benefit].'
      placeholder: "As a user, I want to search for books by title so that I can quickly find what I'm looking for."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Specific, testable criteria for completion.
      placeholder: |
        - [ ] Search input is visible on the Books page
        - [ ] Results filter as the user types (debounced 300ms)
        - [ ] Empty state shown when no results match
        - [ ] Search input is accessible (has label, keyboard navigable)
    validations:
      required: true

  - type: textarea
    id: technical
    attributes:
      label: Technical Notes
      description: Implementation hints, affected files, dependencies.
    validations:
      required: false

  - type: dropdown
    id: estimate
    attributes:
      label: Estimate
      description: Story point estimate.
      options:
        - '1 — Trivial (< 1 hour)'
        - '2 — Small (1-2 hours)'
        - '3 — Medium (half day)'
        - '5 — Large (full day)'
        - '8 — Extra Large (2+ days)'
        - '13 — Epic-sized (needs breakdown)'
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any issues that must be completed before this one.
      placeholder: 'Depends on #42, #43'
    validations:
      required: false
